<style>
/* ===================================================== */
/* 🌍 GENEL */
/* ===================================================== */

body {
  margin: 0;
  padding: 0;
}

* {
  box-sizing: border-box;
}

#map {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
  z-index: 1;
  background: #000;
}

/* UI Katmanı */
#ui-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

/* ===================================================== */
/* 🔍 ZOOM */
/* ===================================================== */

#zoom-level {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 4px 8px;
  border-radius: 4px;
  font-family: Tahoma, sans-serif;
  font-size: 11px;
  z-index: 9999;
  max-width: 90vw;
  opacity: 1;
  transition: opacity 0.6s ease;
}

#zoom-level.hide {
  opacity: 0;
}

/* ===================================================== */
/* ✨ SLOGAN */
/* ===================================================== */

#slogan {
  position: absolute;
  top: 200px;
  left: 50%;

  transform: translate(-50%, -80vh) scale(0.95);
  opacity: 0;

  font-family: 'Poppins', sans-serif;
  font-size: 16px;
  font-weight: 500;
  color: #FFEA00;
  line-height: 1.1;   /* 🔥 bunu düşür */

  z-index: 9999;

  /* 🔥 BURASI KRİTİK */
  width: 90vw;          /* max-content kaldırıldı */
  max-width: 600px;    /* taşmayı engeller */
  
  text-align: left;

  /* 🔥 KELİME DAVRANIŞI */
  white-space: normal;
  word-break: keep-all;     /* kelimeyi bölmez */
  overflow-wrap: break-word; /* gerekirse kırar ama düzgün */

  transition:
    transform 2.8s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 2.2s ease;
}

/* ===================================================== */
/* ℹ️ INFO PANEL */
/* ===================================================== */

#info-panel {
  position: absolute;
  bottom: 67px;
  left: 15px;

  width: 45vw;
  max-width: 220px;

  background: rgba(0,60,150,0.75);
  color: #fff;

  padding: 4px 8px;
  border-radius: 4px;

  font-family: Tahoma, sans-serif;
  font-size: 10.5px;
  line-height: 1.6;

  backdrop-filter: blur(8px);

  display: none;

  opacity: 0;
  transform: translateY(10px);
  transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.22,1,0.36,1);
}

#info-panel.show {
  opacity: 1;
  transform: translateY(0);
}

.info-item {
  opacity: 0;
  transform: translateX(-10px);
  animation: fadeInItem 0.6s forwards;
  font-weight: 500;
}

@keyframes fadeInItem {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* ===================================================== */
/* 📞 CONTACT */
/* ===================================================== */

#contact-box {
  position: absolute;
  bottom: 150px;
  left: 15px;

  width: 45vw;
  max-width: 220px;

  background: rgba(0,0,0,0.8);
  color: #fff;

  padding: 6px 8px;
  border-radius: 4px;

  font-family: Tahoma, sans-serif;
  font-size: 11px;
  line-height: 1.5;

  backdrop-filter: blur(6px);

  display: none;

  opacity: 0;
  transform: translateY(15px);
  transition: opacity 2.2s ease, transform 2.2s cubic-bezier(0.22,1,0.36,1);
}

#contact-box.show {
  opacity: 1;
  transform: translateY(0);
}

.contact-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ===================================================== */
/* 🏆 HERO TITLE */
/* ===================================================== */

#hero-center-title {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);

  font-family: 'Poppins', sans-serif;
  font-size: 20px;
  font-weight: 700;

  color: #FFEA00;

  opacity: 0;
  transition: opacity 2s ease, transform 2s ease;

  z-index: 99999;
  pointer-events: none;

  text-align: center;
  max-width: 90vw;
}
@keyframes letterWave{
  0% { color:#FFEA00; }
  50% { color:#0000FF; }
  100% { color:#FFEA00; }
}
/* ===================================================== */
/* ✈ FLIGHT PANEL */
/* ===================================================== */

#flightPanel {
  position: absolute;
  top: 30px;
  right: 15px;

  max-width: 85vw;

  background: linear-gradient(
    135deg,
    rgba(20,20,28,0.92),
    rgba(10,10,15,0.88)
  );

  color: #e6e6e6;

  padding: 8px 10px;
  border-radius: 8px;

  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: 11px;
  line-height: 1.4;

  backdrop-filter: blur(10px);

  box-shadow:
    0 8px 20px rgba(0,0,0,0.5),
    inset 0 0 0 1px rgba(255,255,255,0.05);

  opacity: 0;
  transform: translateY(-40px) scale(0.98);

  transition: opacity 2s ease,
              transform 2s cubic-bezier(0.16,1,0.3,1);
}

#flightPanel.active {
  opacity: 1;
  transform: translateY(0) scale(1);
  transition: opacity 1s ease, transform 1s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 15px #7CFC00, 0 8px 20px rgba(0,0,0,0.5);
}

#flightPanel div {
  margin-bottom: 6px;
}

#flightPanel div:last-child {
  margin-bottom: 0;
}

/* Vurgular */
#distanceInfo { color: #4fd1c5; font-weight: 600; }
#speedInfo    { color: #f6ad55; }
#timeInfo     { color: #a0aec0; }


/* ============================= */
/* 🎞️ CAROUSEL ANA KAPSAYICI */
/* ============================= */

#carousel{
  position:absolute;
  top:39%;
  left:50%;

  /* Ortalama + küçük başlangıç ölçeği */
  transform:translate(-50%, -50%) scale(0.85);

  width:300px;
  height:280px;

  overflow:hidden;            /* taşan kısımları gizler */
  border-radius:6px;          /* hafif yuvarlak köşe */

  z-index:99999;

  opacity:0;

  /* Yumuşak giriş animasyonu */
  transition:
    opacity 1.4s cubic-bezier(0.22,1,0.36,1),
    transform 1.4s cubic-bezier(0.22,1,0.36,1);

  /* 🔥 PREMIUM SHADOW */
  box-shadow:
    0 10px 25px rgba(0,0,0,0.35),   /* dış gölge */
    0 0 40px rgba(0,0,0,0.15);      /* yumuşak yayılım */
}

/* ============================= */
/* 🎬 AKTİF HAL */
/* ============================= */

#carousel.show{
  opacity:1;

  /* Tam boyuta geçiş */
  transform:translate(-50%, -50%) scale(1);
}

/* ============================= */
/* 🖼️ RESİMLER */
/* ============================= */

.carousel-img{
  position:absolute;
  width:100%;
  height:100%;

  object-fit:cover;  /* görüntü oranını korur */

  opacity:0;

  transition:opacity 1.2s ease;
}

/* Aktif resim */
.carousel-img.active{
  opacity:1;
}

#soundBtn {
  position: fixed;
  right: 16px;
  bottom: 30px;

  width: 35px;
  height: 35px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);

  color: white;
  font-size: 16px;

  border-radius: 50%;
  cursor: pointer;
  z-index: 99999;

  transition: 0.2s ease;
}
#soundBtn:hover {
  transform: scale(1.08);
  background: rgba(0,0,0,0.6);
}

</style>

  return new Promise((resolve) => {

    const utterance = new SpeechSynthesisUtterance(text);

    utterance.lang = "tr-TR";
    utterance.rate = 1.25;   // hız biraz düşürüldü (stabil)
    utterance.pitch = 1;
    utterance.volume = 1;

    utterance.onend = resolve;
    utterance.onerror = resolve;

    speechSynthesis.speak(utterance);
  });

    droneEl.style.height = "auto";
    droneEl.style.opacity = "0";
    droneEl.style.transition = "opacity 1.2s ease";
    droneEl.style.pointerEvents = "none";

    droneMarker = new mapboxgl.Marker({
      element: droneEl,
      anchor: "center",
	  rotationAlignment: "map"
    })
      .setLngLat(route[0])
      .addTo(map);
	  
	// 🚀 BURASI KRİTİK
	  const initialBearing = (Math.atan2(
	  route[1][0] - route[0][0],
	  route[1][1] - route[0][1]
	) * 180 / Math.PI + 360) % 360;

	droneMarker.setRotation(initialBearing);

    // Panel ile senkron fade-in
    setTimeout(() => {
      droneEl.style.opacity = "1";
    }, 100);
  }

}, 3000);


});

/* -------- SABİT HIZ -------- */
let droneMarker = null;
let currentDroneRotation = null;

// Gerçek hız için
let lastSpeedTime = null;
let lastSpeedPosition = null;

// 🔥 GLOBAL ALTITUDE FONKSİYONU
function getAltitudeFromZoom(zoom) {
  return Math.max(30, Math.round(3000 / Math.pow(2, zoom - 10)));
}

// 🔥 PANEL ALTITUDE GÜNCELLEME (HER ZOOM/MOVE'DA ÇALIŞIR)
function updateAltitude() {
  const zoom = map.getZoom();
  const altitude = getAltitudeFromZoom(zoom);

  const el = document.getElementById("altitudeInfo");
  if (el) {
    el.innerText = "Altitude: ~" + Math.round(altitude) + " m";
  }
}

// 🔥 KRİTİK SATIR (SORUNU ÇÖZEN)
map.on("move", updateAltitude);

function startSmoothRoute() {

  const zoomElement = document.getElementById("zoom-level");
  if (zoomElement) zoomElement.classList.add("hide");

  const totalDuration = 20000;
  const climbDuration = 4000;
  const targetPitch = 15;

  const WAIT_TIME = 4000; // ✅ ilk 4 saniye bekleme

  let startTime = null;

  const distanceElement = document.getElementById("distanceInfo");
  const speedElement = document.getElementById("speedInfo");
  const timeElement = document.getElementById("timeInfo");
  const altitudeElement = document.getElementById("altitudeInfo");

  lastSpeedTime = null;
  lastSpeedPosition = null;

  function getAltitudeFromZoom(zoom) {
    return Math.max(30, Math.round(3000 / Math.pow(2, zoom - 10)));
  }

  function getDistance(a, b) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(b[1] - a[1]);
    const dLng = toRad(b[0] - a[0]);

    const lat1 = toRad(a[1]);
    const lat2 = toRad(b[1]);

    const h =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1) * Math.cos(lat2) *
      Math.sin(dLng / 2) ** 2;

    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function getBearing(a, b) {
    const dx = b[0] - a[0];
    const dy = b[1] - a[1];
    return (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
  }

  let totalDistance = 0;
  for (let i = 0; i < route.length - 1; i++) {
    totalDistance += getDistance(route[i], route[i + 1]);
  }

  const averageSpeedMS = totalDistance / (totalDuration / 1000);
  const MAX_SPEED_MS = averageSpeedMS;

  function animate(time) {

    if (!startTime) startTime = time;

    const elapsed = time - startTime;

    // =========================
    // 1️⃣ İLK 4 SANİYE: SADECE İRTİFA
    // =========================

		if (elapsed < WAIT_TIME) {
		
		// 🎯 Pitch’i 0 → targetPitch yap
		  const progress = elapsed / WAIT_TIME;
		  const ease = 1 - Math.pow(1 - progress, 3); // yumuşak geçiş
		  const newPitch = targetPitch * ease;

		  map.setPitch(newPitch);

		  // İrtifa güncelle
		  updateClimb(elapsed);

		  // 🔥 PANEL ÇALIŞSIN
		  timeElement.innerText =
			"Flight Time: " + Math.floor(elapsed / 1000) + " sn";

		  distanceElement.innerText =
			"Dist to Home: 0.00 km";

		  speedElement.innerText =
			"GroundSpeed: 0 m/s";

		  requestAnimationFrame(animate);
		  return;
		}

    // =========================
    // ZAMAN ORANI (YAVAŞLAMA YOK)
    // =========================
    let t = (elapsed - WAIT_TIME) / (totalDuration - WAIT_TIME);
    t = Math.min(t, 1);

    const distanceCovered = t * totalDistance;

    // =========================
    // HIZ HESABI
    // =========================
    if (lastSpeedTime !== null && lastSpeedPosition && droneMarker) {

      const currentPos = droneMarker.getLngLat().toArray();

      const dt = (time - lastSpeedTime) / 1000;

      if (dt > 0) {

        const distance = getDistance(lastSpeedPosition, currentPos);
        let speedMS = distance / dt; // gerçek hız

        // ✅ maksimum 20 m/s limit
        if (speedMS > 20) speedMS = 20;

        speedElement.innerText =
          "GroundSpeed: " + speedMS.toFixed(1) + " m/s";
      }
    }

    if (droneMarker) {
      lastSpeedPosition = droneMarker.getLngLat().toArray();
    }

    lastSpeedTime = time;

    // =========================
    // MESAFE / ZAMAN
    // =========================
    distanceElement.innerText =
      "Dist to Home: " + (distanceCovered / 1000).toFixed(2) + " km";

    timeElement.innerText =
      "Flight Time: " + Math.floor(elapsed / 1000) + " sn";

    // =========================
    // İRTİFA
    // =========================
    const currentZoom = map.getZoom();
    const zoomAltitude = getAltitudeFromZoom(currentZoom);

    let climbAltitude;

    if (elapsed < climbDuration) {
      const progress = elapsed / climbDuration;
      const easeOut = 1 - Math.pow(1 - progress, 3);
      climbAltitude = zoomAltitude * easeOut;
    } else {
      climbAltitude = zoomAltitude;
    }

    altitudeElement.innerText =
      "Altitude: ~" + Math.round(climbAltitude) + " m";

    // =========================
    // ROTA
    // =========================
    let traveled = 0;

    for (let i = 0; i < route.length - 1; i++) {

      const segment = getDistance(route[i], route[i + 1]);

      if (traveled + segment >= distanceCovered) {

        const progress =
          (distanceCovered - traveled) / segment;

        const lng =
          route[i][0] +
          (route[i + 1][0] - route[i][0]) * progress;

        const lat =
          route[i][1] +
          (route[i + 1][1] - route[i][1]) * progress;

        map.easeTo({
          center: [lng, lat],
          pitch: targetPitch,
          zoom: currentZoom,
          duration: 0
        });

        if (droneMarker) {

          const targetRotation = getBearing(
            route[i],
            route[i + 1]
          );

          if (currentDroneRotation === null) {
            currentDroneRotation = targetRotation;
          } else {

            let diff =
              (targetRotation - currentDroneRotation + 540) % 360 - 180;

            currentDroneRotation += diff * 0.05;
          }

          droneMarker
            .setLngLat([lng, lat])
            .setRotation(currentDroneRotation);
			const currentMapBearing = map.getBearing();

			let diff = (currentDroneRotation - currentMapBearing + 540) % 360 - 180;

			// 🔥 maksimum dönüş (derece/frame)
			const maxStep = 0.3; // bunu düşür → daha yavaş

			// clamp
			if (diff > maxStep) diff = maxStep;
			if (diff < -maxStep) diff = -maxStep;

			const newBearing = currentMapBearing + diff;

			map.setBearing(newBearing);
        }

        break;
      }

      traveled += segment;
    }

    // =========================
    // BİTİŞ
    // =========================
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {

      startRotation();
    }
  }

  function updateClimb(elapsed) {

    const currentZoom = map.getZoom();
    const zoomAltitude = getAltitudeFromZoom(currentZoom);

    const progress = Math.min(elapsed / climbDuration, 1);
    const easeOut = 1 - Math.pow(1 - progress, 3);

    const climbAltitude = zoomAltitude * easeOut;

    altitudeElement.innerText =
      "Altitude: ~" + Math.round(climbAltitude) + " m";
  }

  requestAnimationFrame(animate);
}



/* -------- 360° DÖNÜŞ -------- */

function startRotation() {

  const geoCenter = [33.983379, 38.39825];

  if (rotation) cancelAnimationFrame(rotation);

  map.easeTo({
    center: geoCenter,
    zoom: 16,
    duration: 6000,
    pitch: 35
  });

  map.once("moveend", () => {

  // =========================
  // MARKER FADE
  // =========================
  if (typeof markers !== "undefined") {

    markers.forEach(marker => {
      const el = marker.getElement();

      if (el) {
        el.style.transition = "opacity 1500ms ease";
        el.style.opacity = "0";
      }

      setTimeout(() => {
        marker.remove();
      }, 1500);

    });

    markers = [];
  }
  
  const panel = document.getElementById("flightPanel");
  if (panel) {
    panel.style.transition = "opacity 800ms ease, transform 800ms ease";
    panel.style.opacity = "0";
    panel.style.transform = "translateY(-20px)";
  }

  // =========================
  // DRONE SPIN BAŞLANGICI
  // =========================

  let turned = 0;
  const step = 0.3;  // 🔥 DÖNÜŞ HIZI BURASI

  // Drone’un mevcut rotasyonunu koru
  let droneStartRotation = 0;

  if (droneMarker) {
    droneStartRotation = currentDroneRotation ?? map.getBearing();
  }

  function spin() {

    // Harita döner
    const newBearing = map.getBearing() + step;
    map.setBearing(newBearing);

    // Drone harita ile senkron, ama başlangıç yönünden devam eder
    if (droneMarker) {
      droneMarker.setRotation(droneStartRotation + turned);
    }

    turned += step;

    if (turned < 360) {

      rotation = requestAnimationFrame(spin);

    } else {

      // =========================
      // DÖNÜŞ BİTTİ
      // =========================

      const fadeDuration = 3000;
	  
	  // 🔇 MÜZİĞİ DURDUR (BURAYA EKLE)
	  const music = document.getElementById("bgMusic");
	  if (music) {
		music.pause();
		music.currentTime = 0;
	  }

      if (droneMarker) {

        const el = droneMarker.getElement();
        el.style.transition = `opacity ${fadeDuration}ms ease`;
        el.style.opacity = "0";

        setTimeout(() => {
          droneMarker.remove();
          droneMarker = null;
        }, fadeDuration);
      }

      setTimeout(() => {

        startTextFlow();
        showCenterTitle();
        fadeInParcelLabel();

      }, 2000);

    }
  }

  spin();

});

}

function fadeInParcelLabel() {

  let opacity = 0;

  const fade = setInterval(() => {
    opacity += 0.05;

    map.setPaintProperty(
	  'parcels-labels',
	  'text-opacity',
	  Math.min(opacity, 1)
	);

    if (opacity >= 1) clearInterval(fade);

  }, 60);
}

function showCenterTitle() {
  const title = document.getElementById("hero-center-title");

  title.innerHTML = "";

  textLines.forEach(line => {
    const lineDiv = document.createElement("div"); // her satır için div
    lineDiv.style.display = "block"; // satır olarak göster
    lineDiv.style.textAlign = "center"; // istersen ortala

    [...line].forEach((letter, index) => {
      const span = document.createElement("span");
      span.style.display = "inline-block";
      span.style.animation = `letterWave 4s ease-in-out ${index * 0.2}s infinite`;

      if (letter === " ") {
        span.innerHTML = "&nbsp;";
      } else {
        span.textContent = letter;
      }

      lineDiv.appendChild(span);
    });

    title.appendChild(lineDiv);
  });

  // Göster
  title.style.opacity = 1;
  title.style.transform = "translate(-50%, -50%) scale(1)";
}

/* ===============================
     SES SİSTEMİ KONTROLÜ
  =============================== */

function fadeOutMusic(audio, duration = 2000) {

  if (window.fadeTimer) clearInterval(window.fadeTimer);

  let volume = audio.volume;
  const step = 50;
  const decrement = volume / (duration / step);

  window.fadeTimer = setInterval(() => {

    volume -= decrement;

    if (volume <= 0) {
      volume = 0;
      audio.pause();
      audio.currentTime = 0;
      clearInterval(window.fadeTimer);
      window.fadeTimer = null;
    }

    audio.volume = volume;

  }, step);
}


// =========================
// ELEMENTLER
// =========================

const music = document.getElementById("bgMusic");
const btn = document.getElementById("soundBtn");

let isPlaying = false;

// =========================
// BAŞLANGIÇ AYAR
// =========================

music.volume = 1;

// =========================
// BUTON KONTROL
// =========================

btn.addEventListener("click", async () => {

  if (!isPlaying) {

    music.volume = 1;
    await music.play();

    isPlaying = true;
    btn.textContent = "🔊";

  } else {

    fadeOutMusic(music, 4000);

    isPlaying = false;
    btn.textContent = "🔇";
  }

});
